<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mudae Tool</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/node-vibrant/3.1.6/vibrant.min.js"></script>
    <style>
        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
            --accent-color: #00e5a3;
            --btn-color: #efaeff; 
            --card-bg: #0a1414;
            --input-bg: #000000;
            --border-color: #333333;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px 40px; 
        }

        h2 { margin-top: 0; font-size: 16px; font-weight: normal; }
        
        textarea {
            width: 100%;
            height: 120px;
            background-color: var(--input-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 10px;
            font-family: monospace;
            resize: vertical;
            margin-bottom: 20px;
            box-sizing: border-box;
        }
        
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 30px;
        }
        
        .color-options {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .radio-label {
            display: flex;
            align-items: center;
            cursor: pointer;
            font-size: 14px;
            user-select: none;
        }
        
        .radio-label input {
            appearance: none;
            width: 16px;
            height: 16px;
            border: 2px solid #555;
            border-radius: 50%;
            margin-right: 10px;
            outline: none;
            cursor: pointer;
            position: relative;
        }
        
        .radio-label input:checked { border-color: var(--accent-color); }
        .radio-label input:checked::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 8px;
            height: 8px;
            background-color: var(--accent-color);
            border-radius: 50%;
        }
        
        .btn-ahk {
            background-color: var(--btn-color);
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
            display: none; 
        }
        .btn-ahk:hover { opacity: 0.8; }
        
        .card-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 12000px; 
            width: 100%;
        }
        
        .card {
            background-color: var(--card-bg);
            border-radius: 6px;
            padding-left: 15px; 
            padding-right: 30px;
            padding-top: 15px;
            padding-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 25px;
            position: relative;
        }
        
        .card img {
            height: 160px; 
            width: 105px;   
            border-radius: 6px;
            object-fit: contain;
            display: block;
        }
        
        .card-info {
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex-grow: 1;
        }
        
        .command-text {
            font-family: monospace;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .command-highlight {
            color: #000;
            padding: 4px 10px;
            border-radius: 4px;
            font-weight: bold;
        }
        
        .btn-copy {
            background-color: var(--btn-color);
            color: #000;
            border: none;
            width: 90px; 
            height: 50px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            position: absolute;
            right: 30px; 
            top: 50%;
            transform: translateY(-50%);
        }

        @media (max-width: 768px) {
            body { padding: 15px; }
            .btn-ahk { display: none !important; }
            .card { padding: 10px; gap: 15px; }
            .card img { height: 120px; width: 80px; }
            .command-text { font-size: 13px; }
            .btn-copy { right: 10px; width: 70px; height: 32px; font-size: 12px; }
        }
    </style>
</head>
<body>
    <h2>Sài $mmyi-c-s rồi sao chép và dán tin nhắn được gửi trong DMs vào ô bên dưới</h2>
    <textarea id="mudaeInput"></textarea>
    
    <div class="controls">
        <div class="color-options" id="colorOptions">
            <label class="radio-label"><input type="radio" name="palette" value="Vibrant" checked> Vibrant ( Sống động )</label>
            <label class="radio-label"><input type="radio" name="palette" value="Muted"> Muted ( Trầm )</label>
            <label class="radio-label"><input type="radio" name="palette" value="DarkVibrant"> DarkVibrant</label>
            <label class="radio-label"><input type="radio" name="palette" value="DarkMuted"> DarkMuted</label>
            <label class="radio-label"><input type="radio" name="palette" value="LightVibrant"> LightVibrant</label>
            <label class="radio-label"><input type="radio" name="palette" value="LightMuted"> LightMuted</label>
        </div>
        <button class="btn-ahk" id="btnAhk" onclick="downloadAHK()">Download AutoHotkey script</button>
    </div>
    
    <div class="card-container" id="results"></div>

    <script>
        const inputArea = document.getElementById('mudaeInput');
        const resultsDiv = document.getElementById('results');
        const colorRadios = document.querySelectorAll('input[name="palette"]');
        const btnAhk = document.getElementById('btnAhk');
        let charactersData = [];
        let currentPaletteChoice = 'Vibrant';

        colorRadios.forEach(radio => {
            radio.addEventListener('change', (e) => {
                currentPaletteChoice = e.target.value;
                renderCards();
            });
        });

        inputArea.addEventListener('input', () => {
            const text = inputArea.value;
            const lines = text.split('\n');
            charactersData = [];
            resultsDiv.innerHTML = '';
            btnAhk.style.display = 'none';
            
            const regex = /^([^\·]+)\s*·.*?(?:-|–)\s*(https?:\/\/[^\s]+)/;

            for (let line of lines) {
                const match = line.match(regex);
                if (match) {
                    charactersData.push({
                        name: match[1].trim(),
                        originalUrl: match[2].trim(),
                        palettes: null
                    });
                }
            }

            renderCards();
            extractColors();
        });

        function renderCards() {
            resultsDiv.innerHTML = '';
            charactersData.forEach((char) => {
                const card = document.createElement('div');
                card.className = 'card';
                let hexColor = '';
                let isLoaded = false;

                if (char.palettes && char.palettes[currentPaletteChoice]) {
                    hexColor = char.palettes[currentPaletteChoice].hex;
                    isLoaded = true;
                }

                card.style.borderLeft = isLoaded ? `6px solid ${hexColor}` : `2px solid transparent`; 
                
                const command = `$ec ${char.name} $ ${hexColor}`;

                card.innerHTML = `
                    <img src="${char.originalUrl}" alt="${char.name}" referrerpolicy="no-referrer">
                    <div class="card-info">
                        <div class="command-text">
                            $ec ${char.name} $ 
                            ${isLoaded ? `<span class="command-highlight" style="background-color: ${hexColor}">${hexColor}</span>` : ''}
                        </div>
                    </div>
                    <button class="btn-copy" onclick="copyToClipboard('${command}')">Copy</button>
                `;
                resultsDiv.appendChild(card);
            });
        }

        async function extractColors() {
            const concurrencyLimit = 15;
            let currentIndex = 0;

            async function processNext() {
                if (currentIndex >= charactersData.length) return;
                
                const i = currentIndex++;
                if (charactersData[i].palettes) {
                    await processNext();
                    return;
                }
                
                const originalUrl = charactersData[i].originalUrl;
                const proxyUrl = `https://wsrv.nl/?url=${encodeURIComponent(originalUrl)}&output=png&w=80`;

                try {
                    const img = new Image();
                    img.crossOrigin = 'Anonymous';
                    await new Promise((resolve, reject) => {
                        img.onload = resolve;
                        img.onerror = reject;
                        img.src = proxyUrl;
                    });
                    
                    const vibrant = new Vibrant(img);
                    charactersData[i].palettes = await vibrant.getPalette();
                    renderCards();
                } catch (err) {
                    charactersData[i].palettes = {
                        Vibrant: { hex: '#ffffff' }, Muted: { hex: '#cccccc' },
                        DarkVibrant: { hex: '#333333' }, DarkMuted: { hex: '#555555' },
                        LightVibrant: { hex: '#dddddd' }, LightMuted: { hex: '#eeeeee' }
                    };
                    renderCards();
                }
                
                await processNext();
            }

            const workers = [];
            for (let i = 0; i < concurrencyLimit; i++) {
                workers.push(processNext());
            }
            
            await Promise.all(workers);

            if (charactersData.length > 0) {
                btnAhk.style.display = 'block';
            }
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text);
        }

        function downloadAHK() {
            if (charactersData.length === 0) return;
            
            let ahkContent = "#Requires AutoHotkey v2.0\n\n";
            ahkContent += 'ih := InputHook("V")\n';
            ahkContent += 'ih.KeyOpt("{All}", "N")\n';
            ahkContent += 'ih.OnKeyDown := (*) => ExitApp()\n';
            ahkContent += 'ih.Start()\n\n';
            ahkContent += '~*LButton::ExitApp()\n';
            ahkContent += '~*RButton::ExitApp()\n';
            ahkContent += '~*MButton::ExitApp()\n';
            ahkContent += '~*WheelUp::ExitApp()\n';
            ahkContent += '~*WheelDown::ExitApp()\n\n';
            
            ahkContent += 'if WinExist("ahk_exe Discord.exe") {\n';
            ahkContent += '    WinActivate("ahk_exe Discord.exe")\n';
            ahkContent += '    Sleep(1500)\n\n';

            charactersData.forEach(char => {
                let hexColor = '#ffffff';
                if (char.palettes && char.palettes[currentPaletteChoice]) {
                    hexColor = char.palettes[currentPaletteChoice].hex;
                }
                const command = `$ec ${char.name} $ ${hexColor}`;
                ahkContent += `    SendText("${command}")\n`;
                ahkContent += `    Send("{Enter}")\n`;
                ahkContent += `    Sleep(1500)\n\n`; 
            });
            ahkContent += '} else {\n';
            ahkContent += '    MsgBox("Khong tim thay cua so Discord dang mo!")\n';
            ahkContent += '}\n\n';
            ahkContent += 'ExitApp()\n';

            const blob = new Blob([ahkContent], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'mudae_color_auto.ahk';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
